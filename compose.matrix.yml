# Local, DEV-ONLY Matrix stack overlay: Synapse + Matrix Authentication
# Service (MAS) + Element Web, delegating auth to the project Keycloak
# (realm "hub"). Merged under the same `hub` project as compose.yml so it
# shares the default network and resolves `nginx`, `keycloak`, `synapse`,
# `mas`. It is NEVER part of the normal stack: only the `*-matrix` Make
# targets pass `-f compose.matrix.yml`, so `run`/`run-backend`/`stop` ignore
# these services entirely.
name: hub

services:
  # Dedicated Postgres for MAS (mirrors kc_postgresql); ephemeral, no host
  # port. Synapse uses SQLite instead and needs no database service.
  matrix_postgresql:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 1s
      timeout: 2s
      retries: 300
    env_file:
      - env.d/development/matrix
      - env.d/development/matrix.local

  synapse:
    image: ghcr.io/element-hq/synapse:v1.136.0
    environment:
      SYNAPSE_CONFIG_PATH: /config/homeserver.yaml
    volumes:
      # Committed config + dev signing key (read-only)...
      - ./docker/matrix/synapse:/config:ro
      # ...and a git-ignored writable volume for the SQLite DB + media.
      - ./data/matrix/synapse:/data
    ports:
      - "9808:8008"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8008/health"]
      interval: 2s
      timeout: 5s
      retries: 60
      start_period: 10s

  # MAS image is distroless (no shell / curl), so it gets no exec healthcheck
  # and a plain `server` command: on start it runs DB migrations and syncs the
  # static config into the database.
  mas:
    image: ghcr.io/element-hq/matrix-authentication-service:1.3.0
    command: ["server", "--config", "/config/config.yaml"]
    volumes:
      - ./docker/matrix/mas:/config:ro
      # Private signing keys generated by `make run-matrix` (never committed).
      - ./data/matrix/mas:/secrets:ro
    ports:
      - "9810:8080"
    depends_on:
      matrix_postgresql:
        condition: service_healthy
        restart: true
      synapse:
        condition: service_started

  element:
    image: vectorim/element-web:v1.12.15
    # The image's nginx renders `listen ${ELEMENT_WEB_PORT}` (default 80); pin it
    # to 8080 so it matches the published port and the healthcheck below.
    environment:
      ELEMENT_WEB_PORT: "8080"
    volumes:
      - ./docker/matrix/element/config.json:/app/config.json:ro
    ports:
      - "9807:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 2s
      timeout: 5s
      retries: 60
      start_period: 5s
    depends_on:
      synapse:
        condition: service_started
