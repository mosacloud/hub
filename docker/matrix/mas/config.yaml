# Matrix Authentication Service - DEV ONLY.
#
# Delegates authentication to the project Keycloak (realm "hub") and provisions
# matching Matrix users on the local Synapse. Obviously-fake dev secrets and
# permissive localhost client registration are acceptable ONLY because this
# stack never ships to production. The private signing keys are NOT committed:
# `make run-matrix` generates them under the git-ignored data/matrix/mas/,
# mounted at /secrets (see the `key_file` entries below).

http:
  # Browser-facing base URL (host port). Synapse advertises this issuer to
  # clients through /_matrix/client/v1/auth_metadata.
  public_base: http://localhost:9810/
  issuer: http://localhost:9810/
  listeners:
    - name: web
      resources:
        - name: discovery
        - name: human
        - name: oauth
        - name: compat
        - name: graphql
        - name: assets
      binds:
        - address: "[::]:8080"
      proxy_protocol: false
    - name: internal
      resources:
        - name: health
      binds:
        - host: 0.0.0.0
          port: 8081
      proxy_protocol: false

# MAS database (matrix_postgresql); credentials mirror env.d/development/matrix.
database:
  host: matrix_postgresql
  port: 5432
  username: mas
  password: pass
  database: mas

matrix:
  kind: synapse
  # server_name of the homeserver (users become @<localpart>:localhost).
  homeserver: localhost
  # SERVER-side address MAS uses to provision/introspect on the Docker network.
  endpoint: http://synapse:8008/
  # Shared secret - must equal matrix_authentication_service.secret in Synapse.
  secret: ThisIsASynapseToMasSharedSecretForDevOnly

# SSO-only: no local password accounts; every identity comes from Keycloak.
passwords:
  enabled: false

# Dev-only static OAuth client reserved for the future Hub Matrix driver.
# Element Web still uses dynamic registration below.
clients:
  - client_id: 01J00000000000000000000000
    client_name: Hub
    client_uri: http://localhost:9800
    redirect_uris:
      - http://localhost:9800/
      - http://localhost:9800/chat
      - http://localhost:9800/chat/new
    grant_types:
      - authorization_code
      - refresh_token
    response_types:
      - code
    application_type: web
    client_auth_method: none
    trusted: true

secrets:
  # 32-byte hex encryption key; an obviously-fake repeating pattern, DEV ONLY.
  encryption: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  # Private signing keys generated by `make run-matrix` (openssl on the host)
  # under data/matrix/mas/, git-ignored and mounted read-only at /secrets.
  keys:
    - kid: rsa
      key_file: /secrets/rsa.pem
    - kid: ec-p256
      key_file: /secrets/ec-p256.pem
    - kid: ec-p384
      key_file: /secrets/ec-p384.pem
    - kid: ec-k256
      key_file: /secrets/ec-k256.pem

# Upstream Keycloak (realm "hub"). Discovery is DISABLED because Keycloak's
# discovery document advertises localhost:9803 endpoints MAS's container cannot
# reach. Every endpoint is set explicitly:
#   - authorization (browser redirect)      -> localhost:9803
#   - token / jwks / userinfo (server-side) -> nginx:9803
#   - iss is validated against              -> localhost:9803/realms/hub
upstream_oauth2:
  providers:
    - id: 0XZP24DYZ8BJXR093M5TH4PKB9
      human_name: Keycloak (realm hub)
      issuer: http://localhost:9803/realms/hub
      client_id: matrix-auth
      client_secret: ThisIsAMatrixAuthSecretForDevOnly
      token_endpoint_auth_method: client_secret_basic
      scope: "openid email profile"
      discovery_mode: disabled
      fetch_userinfo: true
      authorization_endpoint: http://localhost:9803/realms/hub/protocol/openid-connect/auth
      token_endpoint: http://nginx:9803/realms/hub/protocol/openid-connect/token
      jwks_uri: http://nginx:9803/realms/hub/protocol/openid-connect/certs
      userinfo_endpoint: http://nginx:9803/realms/hub/protocol/openid-connect/userinfo
      claims_imports:
        localpart:
          action: require
          template: "{{ user.preferred_username }}"
          # The seed pre-creates local accounts and the browser then logs in
          # through Keycloak. `add` links the upstream identity to the matching
          # local user instead of failing with "User exists". DEV ONLY.
          on_conflict: add
        displayname:
          action: suggest
          template: "{{ user.name }}"
        email:
          action: suggest
          template: "{{ user.email }}"

# Allow dynamic OIDC client registration over http://localhost - required by
# Element Web. DEV ONLY; production rejects non-localhost insecure URIs.
policy:
  data:
    client_registration:
      allow_insecure_uris: true
      allow_host_mismatch: false
