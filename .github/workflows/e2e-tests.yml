name: E2E Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  install-dependencies:
    uses: ./.github/workflows/dependencies.yml
    with:
      node_version: '22.x'
      with-front-dependencies-installation: true

  build-frontend-e2e:
    runs-on: ubuntu-latest
    needs: install-dependencies
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"

      - name: Restore the frontend cache
        uses: actions/cache@v5
        with:
          path: "src/frontend/**/node_modules"
          key: front-node_modules-${{ hashFiles('src/frontend/**/yarn.lock') }}
          fail-on-cache-miss: true

      - name: Build frontend (static export, .env.development)
        run: |
          cd src/frontend/apps/hub
          set -a
          . ./.env.development
          set +a
          yarn build

      - name: Upload frontend bundle
        uses: actions/upload-artifact@v6
        with:
          name: hub-frontend-out
          path: src/frontend/apps/hub/out
          retention-days: 1
          if-no-files-found: error

  test-e2e:
    needs: [install-dependencies, build-frontend-e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, webkit, firefox]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"

      - name: Restore the frontend cache
        uses: actions/cache@v5
        with:
          path: "src/frontend/**/node_modules"
          key: front-node_modules-${{ hashFiles('src/frontend/**/yarn.lock') }}
          fail-on-cache-miss: true

      - name: Set e2e env variables
        run: cat env.d/development/common.e2e >> env.d/development/common.local

      - name: Get Playwright version
        id: playwright-version
        run: |
          VERSION=$(node -p "require('./src/frontend/apps/e2e/package.json').devDependencies['@playwright/test']")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd src/frontend/apps/e2e && npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd src/frontend/apps/e2e && npx playwright install-deps ${{ matrix.browser }}

      - name: Download frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: hub-frontend-out
          path: src/frontend/apps/hub/out

      - name: Free disk space before Docker
        uses: ./.github/actions/free-disk-space

      - name: Start Docker services (e2e backend)
        run: make bootstrap-e2e

      - name: Serve frontend (nginx static + prod vhost)
        run: |
          docker run -d --rm --name hub-static -p 9800:3000 \
            -v "$PWD/src/frontend/apps/hub/out:/usr/share/nginx/html:ro" \
            -v "$PWD/src/frontend/apps/hub/conf/default.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:1.25

      - name: Wait for backend to be ready
        run: |
          timeout 30 bash -c 'while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' http://localhost:9801/api/v1.0/config/)" != "200" ]]; do echo "Waiting for backend..." && sleep 1; done' && echo "Backend is ready!"

      - name: Wait for frontend to be ready
        run: |
          timeout 30 bash -c 'while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' http://localhost:9800/)" != "200" ]]; do echo "Waiting for frontend..." && sleep 1; done' && echo "Frontend is ready!"

      - name: Run e2e tests
        env:
          PLAYWRIGHT_LIST_PRINT_STEPS: true
          FORCE_COLOR: true
        run: cd src/frontend/apps/e2e && yarn test --project=${{ matrix.browser }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-${{ matrix.browser }}-report
          path: src/frontend/apps/e2e/report/
          retention-days: 7
