name: Docker Hub Workflow
run-name: Docker Hub Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  pull_request:
    branches:
      - "main"

env:
  DOCKER_USER: 1001:127
  SHOULD_PUSH: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'preview') }}

permissions:
  contents: read

jobs:
  build-and-push-backend:
    uses: ./.github/workflows/docker-publish.yml
    permissions:
      contents: read
    secrets: inherit
    with:
      image_name: mosacloud/hub-backend
      context: .
      file: Dockerfile
      target: backend-production
      should_push: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'preview') }}
      docker_user: 1001:127

  build-and-push-frontend:
    uses: ./.github/workflows/docker-publish.yml
    permissions:
      contents: read
    secrets: inherit
    with:
      image_name: mosacloud/hub-frontend
      context: .
      file: src/frontend/Dockerfile
      target: frontend-production
      should_push: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'preview') }}
      docker_user: 1001:127

  # NOTE: upstream notifies ArgoCD here. The mosacloud dev cluster is hand-deployed
  # (kubectl apply -k apps/dev/), not ArgoCD-managed, so that job is dropped on this
  # fork. Deploying = push :dev image (this workflow) + apply overlay + rollout restart.
