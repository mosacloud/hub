{{- if .Values.posthog.ingress.enabled -}}
{{- $envVars := include "hub.common.env" (list . .Values.posthog) -}}
{{- $fullName := include "hub.posthog.fullname" . -}}
{{- $component := "posthog" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-proxy
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "hub.common.labels" (list . $component) | nindent 4 }}
  annotations:
    {{- toYaml $.Values.posthog.service.annotations | nindent 4 }}
spec:
  type: {{ .Values.posthog.service.type }}
  externalName: {{ .Values.posthog.service.externalName }}
  ports:
    - port: {{ .Values.posthog.service.port }}
      targetPort: {{ .Values.posthog.service.targetPort }}
      protocol: TCP
      name: https
  selector:
    {{- include "hub.common.selectorLabels" (list . $component) | nindent 4 }}
{{- end }}
